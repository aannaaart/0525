<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Plays 聊天室電子雞大冒險</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background-color: #2f3542;
        }
        /* UI 頂部文字樣式 */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .hud-panel {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 18px;
            border-radius: 8px;
        }
        #score-panel {
            color: #ffd32a;
            font-size: 28px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">
            <div class="hud-panel">指令: W/A/S/D 或 上/下/左/右</div>
            <div id="score-panel" class="hud-panel">已餵食次數: 0</div>
        </div>
    </div>

    <script>
        // --- 1. 設定區 ---
        const TWITCH_CHANNEL = 'maoramei';
        const MOVE_SPEED = 35; // 💡 每次聊天室輸入指令，角色移動的距離（可自行調大調小）

        // --- 2. 遊戲核心變數 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        
        // 角色狀態
        const player = {
            x: 400 - 30, // 初始置中
            y: 300 - 30,
            width: 60,
            height: 60
        };

        // 食物陣列 (最多三個)
        let foods = [];
        const MAX_FOODS = 3;
        const FOOD_SIZE = 40;

        // --- 3. 圖片素材預載與尺寸校正 ---
        const imgPlayer = new Image(); imgPlayer.src = 'character.png';
        const imgFood = new Image(); imgFood.src = 'food.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        // --- 4. 遊戲邏輯生成處理 ---
        
        // 生成單個食物（確保不會生在牆壁外面或離邊界太近）
        function spawnFood() {
            const randomX = 50 + Math.random() * (canvas.width - 100);
            const randomY = 80 + Math.random() * (canvas.height - 130);
            foods.push({ x: randomX, y: randomY, width: FOOD_SIZE, height: FOOD_SIZE });
        }

        // 初始生成三個食物
        for (let i = 0; i < MAX_FOODS; i++) {
            spawnFood();
        }

        // AABB 2D 矩形碰撞偵測演算法（最穩定、完全不求人物理）
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // --- 5. 渲染主循環 (Game Loop) ---
        function updateAndRender() {
            // 清空畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製背景 (如果有上傳 background.png 就會顯示，沒有就維持預設背景色)
            if (imgBg.complete && imgBg.width > 0) {
                ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);
            }

            // 繪製食物
            for (let i = foods.length - 1; i >= 0; i--) {
                const f = foods[i];
                if (imgFood.complete && imgFood.width > 0) {
                    ctx.drawImage(imgFood, f.x, f.y, f.width, f.height);
                } else {
                    // 備用方案：若圖片還沒載入好，先畫黃色圓形防呆
                    ctx.fillStyle = '#ffa502';
                    ctx.beginPath();
                    ctx.arc(f.x + f.width/2, f.y + f.height/2, f.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 碰撞檢查：角色碰到食物
                if (checkCollision(player, f)) {
                    foods.splice(i, 1); // 吃掉該食物
                    score++;
                    document.getElementById('score-panel').innerText = `已餵食次數: ${score}`;
                    spawnFood(); // 補滿一個新食物
                }
            }

            // 繪製主角角色
            if (imgPlayer.complete && imgPlayer.width > 0) {
                ctx.drawImage(imgPlayer, player.x, player.y, player.width, player.height);
            } else {
                // 備用方案：若圖片還沒載入好，先畫紅框防呆
                ctx.fillStyle = '#ff4757';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // 持續刷新畫面 (每秒 60 格，極度絲滑)
            requestAnimationFrame(updateAndRender);
        }

        // 啟動渲染循環
        requestAnimationFrame(updateAndRender);

        // --- 6. WebSocket 原生聊天室連線與操作 ---
        function initTwitchConnection() {
            const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                console.log('電子雞已成功接入 Twitch 伺服器！');
                ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                ws.send('PASS oauth:justinfan12345'); 
                ws.send('NICK justinfan12345');
                ws.send(`JOIN #${TWITCH_CHANNEL}`);
            };

            ws.onmessage = (event) => {
                const rawMessage = event.data;
                if (rawMessage.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }

                if (rawMessage.includes('PRIVMSG')) {
                    const match = rawMessage.match(/PRIVMSG #[a-z0-9_]+ :(.+)/);
                    if (match) {
                        const msg = match[1].trim().toLowerCase();

                        // 限制移動範圍不超過邊界
                        if (msg === 'a' || msg === '左' || msg === '!left') {
                            player.x = Math.max(0, player.x - MOVE_SPEED);
                        }
                        if (msg === 'd' || msg === '右' || msg === '!right') {
                            player.x = Math.min(canvas.width - player.width, player.x + MOVE_SPEED);
                        }
                        if (msg === 'w' || msg === '上' || msg === '!up') {
                            player.y = Math.max(0, player.y - MOVE_SPEED);
                        }
                        if (msg === 's' || msg === '下' || msg === '!down') {
                            player.y = Math.min(canvas.height - player.height, player.y + MOVE_SPEED);
                        }
                    }
                }
            };

            ws.onclose = () => { setTimeout(initTwitchConnection, 5000); };
        }

        initTwitchConnection();
    </script>
</body>
</html>
