<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Plays 100%絲滑不抖動娃娃機</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 10px;
            align-self: center;
        }
        #timer { color: #ff4757; font-size: 36px; }
        #announcement {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd32a;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="hud-text">指令: A D 或 左 右 | 目前狀態: <span id="status">大夥們，對準那個箱子！</span></div>
            <div id="timer" class="hud-text">剩餘時間: 30s</div>
        </div>
        <div id="announcement">🎉 神之操作！成功捕獲！<br><span style="font-size: 24px; color: #fff;">快點擊下方連結加入 Steam 願望清單！</span></div>
    </div>

    <script>
        // --- 1. 設定區 ---
        const TWITCH_CHANNEL = 'maoramei'; 
        const ROUND_TIME = 30; 
        // 💡 物理化後的推力速度（數值越大，推得越猛、暴衝越厲害）
        const FORCE_SPEED = 24; 

        // 圖片預載入
        const imgRope = new Image(); imgRope.src = 'rope.png';
        const imgClawOpen = 'claw_open.png';
        const imgClawClose = 'claw_close.png';

        // --- 2. 初始化 Matter.js ---
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Events } = Matter;
        const engine = Engine.create();
        const world = engine.world;

        engine.gravity.y = 1.5; 

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: 800,
                height: 600,
                wireframes: false, 
                background: '#2f3542'
            }
        });
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- 3. 建立機台邊界與出貨洞口 ---
        const ground = Bodies.rectangle(400, 590, 800, 20, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const leftWall = Bodies.rectangle(10, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const rightWall = Bodies.rectangle(790, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const binWall = Bodies.rectangle(180, 500, 15, 160, { isStatic: true, render: { fillStyle: '#a4b0be' } });
        Composite.add(world, [ground, leftWall, rightWall, binWall]);

        // --- 4. 建立「全物理化」的夾子系統 ---
        // 💡 關鍵變更：天車不再是 static！它現在是一個有質量的滑塊
        const clawBase = Bodies.rectangle(400, 50, 60, 20, { 
            frictionAir: 0.15, // 給天車較高的空氣阻力，讓它被推完後能快速停下，方便精準定位
            collisionFilter: { group: -1 }, 
            render: { fillStyle: '#747d8c' } 
        });
        
        const clawBody = Bodies.rectangle(400, 160, 50, 40, { 
            frictionAir: 0.01, // 讓爪子保持低阻力，盪鞦韆盪得很瘋狂
            collisionFilter: { group: -1 },
            render: {
                sprite: {
                    texture: imgClawOpen, 
                    xScale: 1.0,
                    yScale: 1.0
                }
            }
        });

        // 繩子連結
        const rope = Constraint.create({
            bodyA: clawBase,
            bodyB: clawBody,
            pointB: { x: 0, y: -20 },
            stiffness: 0.1, // 稍微提高一點鋼索剛性，擺動起來更扎實
            render: { visible: false } 
        });
        Composite.add(world, [clawBase, clawBody, rope]);

        // 💡 核心修正：天車如果會掉下去就完蛋了，所以每一格畫面都要強制把天車鎖定在 Y=50 的高度，只允許它左右滑動
        Events.on(engine, 'beforeUpdate', function() {
            Body.setPosition(clawBase, { x: clawBase.position.x, y: 50 });
            Body.setVelocity(clawBase, { x: clawBase.velocity.x, y: 0 });

            // 防止天車飛出邊界
            if (clawBase.position.x < 50) Body.setPosition(clawBase, { x: 50, y: 50 });
            if (clawBase.position.x > 750) Body.setPosition(clawBase, { x: 750, y: 50 });
        });

        // 🎨 繩子圖片即時渲染
        Events.on(render, 'afterRender', function() {
            const startX = clawBase.position.x;
            const startY = clawBase.position.y;
            const endX = clawBody.position.x;
            const endY = clawBody.position.y - 20;
            const ctx = render.context;
            
            if (imgRope.complete || imgRope.width > 0) {
                ctx.save();
                ctx.beginPath();
                const dx = endX - startX;
                const dy = endY - startY;
                const angle = Math.atan2(dy, dx);
                const distance = Math.sqrt(dx * dx + dy * dy);

                ctx.translate(startX, startY);
                ctx.rotate(angle);
                ctx.drawImage(imgRope, 0, -8, distance, 16);
                ctx.restore();
            }
        });

        // --- 5. 生成目標獎品 ---
        let prizeBox;
        function spawnSinglePrize() {
            if (!prizeBox || prizeBox.position.x < 180) {
                const randomX = 350 + Math.random() * 350; 
                prizeBox = Bodies.rectangle(randomX, 495, 80, 160, {
                    friction: 0.9,
                    restitution: 0.0, 
                    density: 0.02, 
                    render: {
                        sprite: {
                            texture: 'prize.png', 
                            xScale: 1.0,
                            yScale: 1.0
                        }
                    }
                });
                Composite.add(world, prizeBox);
            }
        }
        spawnSinglePrize();

        // --- 6. 遊戲核心邏輯 ---
        let timeLeft = ROUND_TIME;
        let isClawDropping = false;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isClawDropping) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `剩餘時間: ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        triggerClawDrop();
                    }
                }
            }, 1000);
        }
        startTimer();

        function triggerClawDrop() {
            isClawDropping = true;
            document.getElementById('status').innerText = '下夾中！看命運的安排！';
            document.getElementById('timer').innerText = `剩餘時間: 0s`;

            // 下夾時，強制將天車的速度歸零，不讓它一邊下夾一邊左右亂滑
            Body.setVelocity(clawBase, { x: 0, y: 0 });

            let dropAnimation = setInterval(() => {
                if (rope.length < 350) { 
                    rope.length += 6;
                } else {
                    clearInterval(dropAnimation);
                    
                    clawBody.render.sprite.texture = imgClawClose;

                    const distanceX = Math.abs(clawBody.position.x - prizeBox.position.x);
                    let catchConstraint = null;
                    
                    if (prizeBox.position.x >= 180 && distanceX < 35 && clawBody.position.y < prizeBox.position.y) {
                        catchConstraint = Constraint.create({
                            bodyA: clawBody,
                            bodyB: prizeBox,
                            stiffness: 1.0,
                            render: { visible: false } 
                        });
                        Composite.add(world, catchConstraint);
                    }

                    setTimeout(() => { resetClaw(catchConstraint); }, 1200);
                }
            }, 10);
        }

        function resetClaw(catchConstraint) {
            let liftAnimation = setInterval(() => {
                if (rope.length > 70) {
                    rope.length -= 5;
                } else {
                    clearInterval(liftAnimation);
                    
                    // 💡 返回左側出貨口：改用給予天車一個穩定的左移速度，而不是暴力設定位置
                    let returnAnimation = setInterval(() => {
                        if (clawBase.position.x > 95) {
                            Body.setVelocity(clawBase, { x: -4, y: 0 });
                        } else {
                            clearInterval(returnAnimation);
                            Body.setVelocity(clawBase, { x: 0, y: 0 });
                            
                            if (catchConstraint) {
                                Composite.remove(world, catchConstraint);
                                setTimeout(() => {
                                    if (prizeBox.position.x < 180) {
                                        showCelebration(true);
                                    } else {
                                        showCelebration(false); 
                                    }
                                }, 1500);
                            } else {
                                showCelebration(false); 
                            }
                        }
                    }, 10);
                }
            }, 10);
        }

        function showCelebration(isSuccess) {
            const announcement = document.getElementById('announcement');
            clawBody.render.sprite.texture = imgClawOpen;

            if (isSuccess) {
                announcement.innerHTML = `🎉 神之操作！成功捕獲！<br><span style="font-size: 24px; color: #fff;">快點擊下方連結加入 Steam 願望清單！</span>`;
                announcement.style.display = 'block';
            } else {
                announcement.innerHTML = `❌ 殘念爆衝！沒對準...<br><span style="font-size: 24px; color: #fff;">下一局即將開始，大家節奏抓好！</span>`;
                announcement.style.display = 'block';
            }
            
            setTimeout(() => {
                announcement.style.display = 'none';
                // 重置位置
                Body.setPosition(clawBase, { x: 400, y: 50 });
                Body.setVelocity(clawBase, { x: 0, y: 0 });
                Body.setPosition(clawBody, { x: 400, y: 160 });
                Body.setVelocity(clawBody, { x: 0, y: 0 });
                rope.length = 70;
                timeLeft = ROUND_TIME;
                isClawDropping = false;
                document.getElementById('status').innerText = '大家一起操控中!';
                spawnSinglePrize(); 
                startTimer();
            }, 5000); 
        }

        // --- 7. WebSocket 聊天室連線 ---
        function initTwitchConnection() {
            const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                ws.send('PASS oauth:justinfan12345'); 
                ws.send('NICK justinfan12345');
                ws.send(`JOIN #${TWITCH_CHANNEL}`);
            };

            ws.onmessage = (event) => {
                const rawMessage = event.data;
                if (rawMessage.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }

                if (rawMessage.includes('PRIVMSG') && !isClawDropping) {
                    const match = rawMessage.match(/PRIVMSG #[a-z0-9_]+ :(.+)/);
                    if (match) {
                        const msg = match[1].trim().toLowerCase();

                        // 每次移動依然有隨機的推力幅度
                        const randomMultiplier = 0.8 + Math.random() * 1.0;
                        let finalSpeed = FORCE_SPEED * randomMultiplier;

                        if (msg === 'a' || msg === '左' || msg === '!left') {
                            // 💡 終極改動：改用 Body.setVelocity 直接賦予天車滑塊向左的速度！
                            // 徹底告別 SetPosition 帶來的像素級發抖，回歸純物理模擬。
                            Body.setVelocity(clawBase, { x: -finalSpeed, y: 0 });
                        }
                        if (msg === 'd' || msg === 'right' || msg === '右' || msg === '!right') {
                            Body.setVelocity(clawBase, { x: finalSpeed, y: 0 });
                        }
                    }
                }
            };

            ws.onclose = () => { setTimeout(initTwitchConnection, 5000); };
        }

        initTwitchConnection();
    </script>
</body>
</html>
