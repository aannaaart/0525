<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Plays 100%絲滑不閃爍娃娃機</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 10px;
            align-self: center;
        }
        #timer { color: #ff4757; font-size: 36px; }
        #announcement {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd32a;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="hud-text">指令: A D 或 左 右 | 目前狀態: <span id="status">大夥們，對準那個箱子！</span></div>
            <div id="timer" class="hud-text">剩餘時間: 30s</div>
        </div>
        <div id="announcement">🎉 神之操作！成功捕獲！<br><span style="font-size: 24px; color: #fff;">快點擊下方連結加入 Steam 願望清單！</span></div>
    </div>

    <script>
        // --- 1. 設定區 ---
        const TWITCH_CHANNEL = 'maoramei'; 
        const ROUND_TIME = 30; 
        const FORCE_SPEED = 24; // 暴衝推力速度

        const imgRope = 'rope.png';
        const imgClawOpen = 'claw_open.png';
        const imgClawClose = 'claw_close.png';

        // --- 2. 初始化 Matter.js ---
        const { Engine, Render, Runner, Bodies, Composite, Composites, Constraint, Body, Events } = Matter;
        const engine = Engine.create();
        const world = engine.world;

        engine.gravity.y = 1.5; 

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: 800,
                height: 600,
                wireframes: false, // 必須為 false 才能看到自訂圖片
                background: '#2f3542'
            }
        });
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- 3. 建立機台邊界與出貨洞口 ---
        const ground = Bodies.rectangle(400, 590, 800, 20, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const leftWall = Bodies.rectangle(10, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const rightWall = Bodies.rectangle(790, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const binWall = Bodies.rectangle(180, 500, 15, 160, { isStatic: true, render: { fillStyle: '#a4b0be' } });
        Composite.add(world, [ground, leftWall, rightWall, binWall]);

        // --- 4. 建立天車基座 ---
        const clawBase = Bodies.rectangle(400, 40, 60, 20, { 
            frictionAir: 0.15, 
            collisionFilter: { group: -1 }, 
            render: { fillStyle: '#747d8c' } 
        });
        Composite.add(world, clawBase);

        // --- 5. 💡 建立「物理鏈條繩子與爪子系統」 ---
        // 我們直接用物理骨架生成 7 節相連的短繩索，每節都會吃你的 rope.png，徹底根治渲染衝突！
        const ropeSegmentCount = 7;
        const ropeChain = Composites.stack(400, 60, 1, ropeSegmentCount, 0, 0, function(x, y) {
            return Bodies.rectangle(x, y, 16, 20, { 
                collisionFilter: { group: -1 }, // 繩子互不碰撞
                frictionAir: 0.01,
                render: {
                    sprite: {
                        texture: imgRope, // 💡 每一節都會完美吃你的繩子貼圖！
                        xScale: 1.0,
                        yScale: 1.0
                    }
                }
            });
        });

        // 將這 7 節短繩索用物理關節銲接在一起
        Composites.chain(ropeChain, 0, 0.5, 0, -0.5, { 
            stiffness: 0.8, 
            length: 2,
            render: { visible: false } 
        });
        Composite.add(world, ropeChain);

        // 將繩子頂端綁在天車上
        const topConnect = Constraint.create({
            bodyA: clawBase,
            bodyB: ropeChain.bodies[0],
            pointB: { x: 0, y: -10 },
            stiffness: 0.9,
            render: { visible: false }
        });
        Composite.add(world, topConnect);

        // 建立爪子本體
        const clawBody = Bodies.rectangle(400, 220, 50, 40, { 
            frictionAir: 0.01, 
            collisionFilter: { group: -1 },
            render: {
                sprite: {
                    texture: imgClawOpen, 
                    xScale: 1.0,
                    yScale: 1.0
                }
            }
        });
        Composite.add(world, clawBody);

        // 將爪子綁在繩子的最末端
        const bottomConnect = Constraint.create({
            bodyA: ropeChain.bodies[ropeChain.bodies.length - 1],
            bodyB: clawBody,
            pointA: { x: 0, y: 10 },
            pointB: { x: 0, y: -20 },
            stiffness: 0.9,
            render: { visible: false }
        });
        Composite.add(world, bottomConnect);

        // 每格畫面強制鎖定天車 Y 軸，並限制邊界
        Events.on(engine, 'beforeUpdate', function() {
            Body.setPosition(clawBase, { x: clawBase.position.x, y: 40 });
            Body.setVelocity(clawBase, { x: clawBase.velocity.x, y: 0 });

            if (clawBase.position.x < 50) Body.setPosition(clawBase, { x: 50, y: 40 });
            if (clawBase.position.x > 750) Body.setPosition(clawBase, { x: 750, y: 40 });
        });

        // --- 6. 生成目標獎品 ---
        let prizeBox;
        function spawnSinglePrize() {
            if (!prizeBox || prizeBox.position.x < 180) {
                const randomX = 350 + Math.random() * 350; 
                prizeBox = Bodies.rectangle(randomX, 495, 80, 160, {
                    friction: 0.9,
                    restitution: 0.0, 
                    density: 0.02, 
                    render: {
                        sprite: {
                            texture: 'prize.png', 
                            xScale: 1.0,
                            yScale: 1.0
                        }
                    }
                });
                Composite.add(world, prizeBox);
            }
        }
        spawnSinglePrize();

        // --- 7. 遊戲核心邏輯 ---
        let timeLeft = ROUND_TIME;
        let isClawDropping = false;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isClawDropping) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `剩餘時間: ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        triggerClawDrop();
                    }
                }
            }, 1000);
        }
        startTimer();

        // 下夾動畫核心：直接透過「拉長每一節鏈條的間距」來完美達成物理伸長！
        function triggerClawDrop() {
            isClawDropping = true;
            document.getElementById('status').innerText = '下夾中！看命運的安排！';
            document.getElementById('timer').innerText = `剩餘時間: 0s`;

            Body.setVelocity(clawBase, { x: 0, y: 0 });

            // 取得鏈條之間所有的約束關節，並逐漸拉長它們
            const constraints = ropeChain.constraints;
            let currentLen = 2;

            let dropAnimation = setInterval(() => {
                if (currentLen < 36) {
                    currentLen += 1;
                    constraints.forEach(c => c.length = currentLen);
                    topConnect.length = currentLen;
                    bottomConnect.length = currentLen;
                } else {
                    clearInterval(dropAnimation);
                    
                    clawBody.render.sprite.texture = imgClawClose;

                    const distanceX = Math.abs(clawBody.position.x - prizeBox.position.x);
                    let catchConstraint = null;
                    
                    if (prizeBox.position.x >= 180 && distanceX < 45 && clawBody.position.y < prizeBox.position.y) {
                        catchConstraint = Constraint.create({
                            bodyA: clawBody,
                            bodyB: prizeBox,
                            stiffness: 1.0,
                            render: { visible: false } 
                        });
                        Composite.add(world, catchConstraint);
                    }

                    setTimeout(() => { resetClaw(catchConstraint); }, 1200);
                }
            }, 20);
        }

        function resetClaw(catchConstraint) {
            const constraints = ropeChain.constraints;
            let currentLen = 36;

            let liftAnimation = setInterval(() => {
                if (currentLen > 2) {
                    currentLen -= 1;
                    constraints.forEach(c => c.length = currentLen);
                    topConnect.length = currentLen;
                    bottomConnect.length = currentLen;
                } else {
                    clearInterval(liftAnimation);
                    
                    let returnAnimation = setInterval(() => {
                        if (clawBase.position.x > 95) {
                            Body.setVelocity(clawBase, { x: -4, y: 0 });
                        } else {
                            clearInterval(returnAnimation);
                            Body.setVelocity(clawBase, { x: 0, y: 0 });
                            
                            if (catchConstraint) {
                                Composite.remove(world, catchConstraint);
                                setTimeout(() => {
                                    if (prizeBox.position.x < 180) {
                                        showCelebration(true);
                                    } else {
                                        showCelebration(false); 
                                    }
                                }, 1500);
                            } else {
                                showCelebration(false); 
                            }
                        }
                    }, 10);
                }
            }, 20);
        }

        function showCelebration(isSuccess) {
            const announcement = document.getElementById('announcement');
            clawBody.render.sprite.texture = imgClawOpen;

            if (isSuccess) {
                announcement.innerHTML = `🎉 神之操作！成功捕獲！<br><span style="font-size: 24px; color: #fff;">快點擊下方連結加入 Steam 願望清單！</span>`;
                announcement.style.display = 'block';
            } else {
                announcement.innerHTML = `❌ 殘念爆衝！沒對準...<br><span style="font-size: 24px; color: #fff;">下一局即將開始，大家節奏抓好！</span>`;
                announcement.style.display = 'block';
            }
            
            setTimeout(() => {
                announcement.style.display = 'none';
                
                // 完全重置
                Body.setPosition(clawBase, { x: 400, y: 40 });
                Body.setVelocity(clawBase, { x: 0, y: 0 });
                
                ropeChain.constraints.forEach(c => c.length = 2);
                topConnect.length = 2;
                bottomConnect.length = 2;
                
                // 重置每一節鏈條的位置
                for(let i=0; i<ropeChain.bodies.length; i++) {
                    Body.setPosition(ropeChain.bodies[i], { x: 400, y: 60 + (i * 20) });
                    Body.setVelocity(ropeChain.bodies[i], { x: 0, y: 0 });
                }

                Body.setPosition(clawBody, { x: 400, y: 220 });
                Body.setVelocity(clawBody, { x: 0, y: 0 });
                
                isClawDropping = false;
                document.getElementById('status').innerText = '大家一起操控中!';
                spawnSinglePrize(); 
                startTimer();
            }, 5000); 
        }

        // --- 8. WebSocket 聊天室連線 ---
        function initTwitchConnection() {
            const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                ws.send('PASS oauth:justinfan12345'); 
                ws.send('NICK justinfan12345');
                ws.send(`JOIN #${TWITCH_CHANNEL}`);
            };

            ws.onmessage = (event) => {
                const rawMessage = event.data;
                if (rawMessage.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }

                if (rawMessage.includes('PRIVMSG') && !isClawDropping) {
                    const match = rawMessage.match(/PRIVMSG #[a-z0-9_]+ :(.+)/);
                    if (match) {
                        const msg = match[1].trim().toLowerCase();

                        const randomMultiplier = 0.8 + Math.random() * 1.0;
                        let finalSpeed = FORCE_SPEED * randomMultiplier;

                        if (msg === 'a' || msg === '左' || msg === '!left') {
                            if (clawBase.position.x > 50) {
                                Body.setVelocity(clawBase, { x: -finalSpeed, y: 0 });
                            }
                        }
                        if (msg === 'd' || msg === 'right' || msg === '右' || msg === '!right') {
                            if (clawBase.position.x < 750) {
                                Body.setVelocity(clawBase, { x: finalSpeed, y: 0 });
                            }
                        }
                    }
                }
            };

            ws.onclose = () => { setTimeout(initTwitchConnection, 5000); };
        }

        initTwitchConnection();
    </script>
</body>
</html>
