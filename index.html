<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Plays 夾娃娃機</title>
    <!-- 引入 2D 物理引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        /* UI 介面樣式 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 讓滑鼠點擊穿透 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 10px;
            align-self: center;
        }
        #timer { color: #ff4757; font-size: 36px; }
        #announcement {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd32a;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="hud-text">指令: A D 或 左 右 | 目前狀態: <span id="status">大家一起操控中!</span></div>
            <div id="timer" class="hud-text">剩餘時間: 30s</div>
        </div>
        <div id="announcement">🎉 恭喜抓到神獸布偶！<br><span style="font-size: 24px; color: #fff;">記得點擊下方連結加入願望清單喔！</span></div>
    </div>

    <script>
        // --- 1. 設定區 ---
        const TWITCH_CHANNEL = 'maoramei'; // 已自動設定為你的頻道 
        const ROUND_TIME = 30; // 每回合時間 (秒)
        const CLAW_SPEED = 12; // 觀眾輸入指令時夾子移動的速度

        // --- 2. 初始化 Matter.js 物理引擎 ---
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body } = Matter;
        const engine = Engine.create();
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: 800,
                height: 600,
                wireframes: false, // 顯示實心色彩
                background: '#2f3542'
            }
        });
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- 3. 建立娃娃機邊界與洞口 ---
        const ground = Bodies.rectangle(400, 590, 800, 20, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const leftWall = Bodies.rectangle(10, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const rightWall = Bodies.rectangle(790, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const binWall = Bodies.rectangle(180, 500, 15, 160, { isStatic: true, render: { fillStyle: '#a4b0be' } });
        Composite.add(world, [ground, leftWall, rightWall, binWall]);

        // --- 4. 建立夾子系統 (Claw) ---
        const clawBase = Bodies.rectangle(400, 50, 60, 20, { 
            isStatic: true, 
            collisionFilter: { group: -1 }, 
            render: { fillStyle: '#ff7f50' } 
        });
        
        const clawBody = Bodies.rectangle(400, 120, 40, 40, { 
            inertia: Infinity, 
            collisionFilter: { group: -1 },
            render: { fillStyle: '#ff6b81' } 
        });

        const rope = Constraint.create({
            bodyA: clawBase,
            bodyB: clawBody,
            pointB: { x: 0, y: -20 },
            stiffness: 0.9,
            render: { strokeStyle: '#ffffff', lineWidth: 3 }
        });
        Composite.add(world, [clawBase, clawBody, rope]);

        // --- 5. 生成娃娃堆 ---
        function spawnDolls() {
            for (let i = 0; i < 25; i++) {
                const x = 220 + Math.random() * 500;
                const y = 300 + Math.random() * 200;
                const colors = ['#1e90ff', '#2ed573', '#ffa502', '#ff4757', '#9b59b6'];
                const doll = Bodies.circle(x, y, 25, {
                    friction: 0.5,
                    restitution: 0.2,
                    render: { fillStyle: colors[Math.floor(Math.random() * colors.length)] }
                });
                Composite.add(world, doll);
            }
        }
        spawnDolls();

        // --- 6. 遊戲邏輯與計時器狀態 ---
        let timeLeft = ROUND_TIME;
        let isClawDropping = false;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isClawDropping) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `剩餘時間: ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        triggerClawDrop();
                    }
                }
            }, 1000);
        }
        startTimer();

        function triggerClawDrop() {
            isClawDropping = true;
            document.getElementById('status').innerText = '下夾中！請稍候...';
            document.getElementById('timer').innerText = `剩餘時間: 0s`;

            let dropAnimation = setInterval(() => {
                if (rope.length < 350) {
                    rope.length += 5;
                } else {
                    clearInterval(dropAnimation);
                    setTimeout(() => { resetClaw(); }, 1500);
                }
            }, 10);
        }

        function resetClaw() {
            let liftAnimation = setInterval(() => {
                if (rope.length > 70) {
                    rope.length -= 5;
                } else {
                    clearInterval(liftAnimation);
                    
                    let returnAnimation = setInterval(() => {
                        if (clawBase.position.x > 95) {
                            Body.setPosition(clawBase, { x: clawBase.position.x - 4, y: clawBase.position.y });
                            Body.setPosition(clawBody, { x: clawBody.position.x - 4, y: clawBody.position.y });
                        } else {
                            clearInterval(returnAnimation);
                            showCelebration();
                        }
                    }, 10);
                }
            }, 10);
        }

        function showCelebration() {
            const announcement = document.getElementById('announcement');
            announcement.style.display = 'block';
            
            setTimeout(() => {
                announcement.style.display = 'none';
                Body.setPosition(clawBase, { x: 400, y: 50 });
                Body.setPosition(clawBody, { x: 400, y: 120 });
                rope.length = 70;
                timeLeft = ROUND_TIME;
                isClawDropping = false;
                document.getElementById('status').innerText = '大家一起操控中!';
                startTimer();
            }, 5000); 
        }

        // --- 7. WebSocket 聊天室接收處理器 (免外部引入，全內嵌安全版) ---
        function initTwitchConnection() {
            const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                console.log('已經成功建立加密安全連線到 Twitch!');
                ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                ws.send('PASS oauth:justinfan12345'); // 匿名登入，不需憑證
                ws.send('NICK justinfan12345');
                ws.send(`JOIN #${TWITCH_CHANNEL}`);
            };

            ws.onmessage = (event) => {
                const rawMessage = event.data;
                
                // PING-PONG 保持連線不斷線
                if (rawMessage.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }

                // 解析聊天室文字指令
                if (rawMessage.includes('PRIVMSG') && !isClawDropping) {
                    const match = rawMessage.match(/PRIVMSG #[a-z0-9_]+ :(.+)/);
                    if (match) {
                        const msg = match[1].trim().toLowerCase();
                        let currentX = clawBase.position.x;
                        let currentY = clawBase.position.y;

                        if (msg === 'a' || msg === '左' || msg === '!left') {
                            if (currentX > 50) {
                                Body.setPosition(clawBase, { x: currentX - CLAW_SPEED, y: currentY });
                                Body.setPosition(clawBody, { x: clawBody.position.x - CLAW_SPEED, y: clawBody.position.y });
                            }
                        }
                        if (msg === 'd' || msg === '右' || msg === '!right') {
                            if (currentX < 750) {
                                Body.setPosition(clawBase, { x: currentX + CLAW_SPEED, y: currentY });
                                Body.setPosition(clawBody, { x: clawBody.position.x + CLAW_SPEED, y: clawBody.position.y });
                            }
                        }
                    }
                }
            };

            ws.onclose = () => {
                console.log('與 Twitch 斷開連線，5秒後自動重新連線...');
                setTimeout(initTwitchConnection, 5000);
            };

            ws.onerror = (error) => {
                console.error('連線發生錯誤：', error);
            };
        }

        // 啟動連線
        initTwitchConnection();
    </script>
</body>
</html>
