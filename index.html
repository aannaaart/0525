<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Plays 擬真微晃夾娃娃機</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 10px;
            align-self: center;
        }
        #timer { color: #ff4757; font-size: 36px; }
        #announcement {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd32a;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="hud-text">指令: A D 或 左 右 | 目前狀態: <span id="status">極限瞄準中！</span></div>
            <div id="timer" class="hud-text">剩餘時間: 30s</div>
        </div>
        <div id="announcement">🎉 完美抓取！！！<br><span style="font-size: 24px; color: #fff;">快點擊下方連結加入 Steam 願望清單！</span></div>
    </div>

    <script>
        // --- 1. 設定區 ---
        const TWITCH_CHANNEL = 'maoramei'; 
        const ROUND_TIME = 30; 
        const BASE_SPEED = 7; // 基礎移動速度

        // --- 2. 初始化 Matter.js ---
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body } = Matter;
        const engine = Engine.create();
        const world = engine.world;

        // 稍微調高物理引擎的重力，讓爪子擺動感更扎實
        engine.gravity.y = 1.2;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: 800,
                height: 600,
                wireframes: false, 
                background: '#2f3542'
            }
        });
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- 3. 建立機台邊界與出貨洞口 ---
        const ground = Bodies.rectangle(400, 590, 800, 20, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const leftWall = Bodies.rectangle(10, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const rightWall = Bodies.rectangle(790, 300, 20, 600, { isStatic: true, render: { fillStyle: '#747d8c' } });
        const binWall = Bodies.rectangle(180, 500, 15, 160, { isStatic: true, render: { fillStyle: '#a4b0be' } });
        Composite.add(world, [ground, leftWall, rightWall, binWall]);

        // --- 4. 建立自訂圖案的夾子系統 ---
        const clawBase = Bodies.rectangle(400, 50, 60, 20, { 
            isStatic: true, 
            collisionFilter: { group: -1 }, 
            render: { fillStyle: '#747d8c' } 
        });
        
        const clawBody = Bodies.rectangle(400, 140, 50, 40, { 
            frictionAir: 0.05, // 💡 增加空氣阻力，讓隨機晃動的擺動收斂得更自然
            collisionFilter: { group: -1 },
            render: {
                sprite: {
                    texture: 'claw.png', 
                    xScale: 1.0,
                    yScale: 1.0
                }
            }
        });

        // 降低關節剛性 (stiffness: 0.1)，讓天車動的時候，下面的爪子會因為物理效果產生漂亮的「盪鞦韆」延遲感
        const rope = Constraint.create({
            bodyA: clawBase,
            bodyB: clawBody,
            pointB: { x: 0, y: -20 },
            stiffness: 0.1, 
            render: { strokeStyle: '#ffffff', lineWidth: 2 }
        });
        Composite.add(world, [clawBase, clawBody, rope]);

        // --- 5. 生成唯一一個目標獎品 ---
        let prizeBox;
        function spawnSinglePrize() {
            if (prizeBox) Composite.remove(world, prizeBox);

            const randomX = 350 + Math.random() * 350; 
            prizeBox = Bodies.rectangle(randomX, 540, 70, 70, {
                friction: 0.8,
                restitution: 0.0, 
                density: 0.01,    
                render: {
                    sprite: {
                        texture: 'prize.png', 
                        xScale: 1.0,
                        yScale: 1.0
                    }
                }
            });
            Composite.add(world, prizeBox);
        }
        spawnSinglePrize();

        // --- 6. 遊戲核心邏輯 ---
        let timeLeft = ROUND_TIME;
        let isClawDropping = false;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isClawDropping) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `剩餘時間: ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        triggerClawDrop();
                    }
                }
            }, 1000);
        }
        startTimer();

        function triggerClawDrop() {
            isClawDropping = true;
            document.getElementById('status').innerText = '下夾中！請鎖定畫面！';
            document.getElementById('timer').innerText = `剩餘時間: 0s`;

            let dropAnimation = setInterval(() => {
                if (rope.length < 420) {
                    rope.length += 6;
                } else {
                    clearInterval(dropAnimation);
                    
                    // 判定差距（縮小到 22 像素，配合物理擺動，難度提高）
                    const distanceX = Math.abs(clawBody.position.x - prizeBox.position.x);
                    let catchConstraint = null;
                    
                    if (distanceX < 22 && clawBody.position.y < prizeBox.position.y) {
                        catchConstraint = Constraint.create({
                            bodyA: clawBody,
                            bodyB: prizeBox,
                            stiffness: 1.0,
                            render: { visible: false } 
                        });
                        Composite.add(world, catchConstraint);
                    }

                    setTimeout(() => { resetClaw(catchConstraint); }, 1200);
                }
            }, 10);
        }

        function resetClaw(catchConstraint) {
            let liftAnimation = setInterval(() => {
                if (rope.length > 70) {
                    rope.length -= 5;
                } else {
                    clearInterval(liftAnimation);
                    
                    let returnAnimation = setInterval(() => {
                        if (clawBase.position.x > 95) {
                            Body.setPosition(clawBase, { x: clawBase.position.x - 4, y: clawBase.position.y });
                            // 升回時強制微調爪子水平位置，確保獎品能跟著走
                            Body.setPosition(clawBody, { x: clawBody.position.x - 4, y: clawBody.position.y });
                            if (catchConstraint) {
                                Body.setPosition(prizeBox, { x: prizeBox.position.x - 4, y: prizeBox.position.y });
                            }
                        } else {
                            clearInterval(returnAnimation);
                            
                            if (catchConstraint) {
                                Composite.remove(world, catchConstraint);
                                setTimeout(() => {
                                    if (prizeBox.position.x < 180) {
                                        showCelebration(true);
                                    } else {
                                        showCelebration(false); 
                                    }
                                }, 1500);
                            } else {
                                showCelebration(false); 
                            }
                        }
                    }, 10);
                }
            }, 10);
        }

        function showCelebration(isSuccess) {
            const announcement = document.getElementById('announcement');
            if (isSuccess) {
                announcement.innerHTML = `🎉 完美抓取！！！<br><span style="font-size: 24px; color: #fff;">快點擊下方連結加入 Steam 願望清單！</span>`;
                announcement.style.display = 'block';
            } else {
                announcement.innerHTML = `❌ 殘念！沒對準...<br><span style="font-size: 24px; color: #fff;">下一局即將開始，大家加油！</span>`;
                announcement.style.display = 'block';
            }
            
            setTimeout(() => {
                announcement.style.display = 'none';
                Body.setPosition(clawBase, { x: 400, y: 50 });
                Body.setPosition(clawBody, { x: 400, y: 140 });
                rope.length = 70;
                timeLeft = ROUND_TIME;
                isClawDropping = false;
                document.getElementById('status').innerText = '大家一起操控中!';
                spawnSinglePrize(); 
                startTimer();
            }, 5000); 
        }

        // --- 7. WebSocket 聊天室與隨機晃動演算法 ---
        function initTwitchConnection() {
            const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                ws.send('PASS oauth:justinfan12345'); 
                ws.send('NICK justinfan12345');
                ws.send(`JOIN #${TWITCH_CHANNEL}`);
            };

            ws.onmessage = (event) => {
                const rawMessage = event.data;
                if (rawMessage.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }

                if (rawMessage.includes('PRIVMSG') && !isClawDropping) {
                    const match = rawMessage.match(/PRIVMSG #[a-z0-9_]+ :(.+)/);
                    if (match) {
                        const msg = match[1].trim().toLowerCase();
                        let currentX = clawBase.position.x;
                        let currentY = clawBase.position.y;

                        // 💡 核心改動：加入隨機性微調
                        // 隨機乘數在 0.6 ~ 1.4 之間，讓每次移動步長都不太一樣
                        const randomMultiplier = 0.6 + Math.random() * 0.8;
                        let finalSpeed = BASE_SPEED * randomMultiplier;

                        // 10% 的機率爪子會因為慣性產生「微幅反彈」的反向微小作用力
                        let wobble = (Math.random() < 0.10) ? -2 : 0;

                        if (msg === 'a' || msg === '左' || msg === '!left') {
                            if (currentX > 50) {
                                // 移動天車基座
                                Body.setPosition(clawBase, { x: currentX - finalSpeed, y: currentY });
                                // 對下方的物理爪子施加一個側向的力，製造漂亮的晃動感！
                                Body.setVelocity(clawBody, { x: -(finalSpeed / 2) - wobble, y: clawBody.velocity.y });
                            }
                        }
                        if (msg === 'd' || msg === 'right' || msg === '右' || msg === '!right') {
                            if (currentX < 750) {
                                Body.setPosition(clawBase, { x: currentX + finalSpeed, y: currentY });
                                Body.setVelocity(clawBody, { x: (finalSpeed / 2) + wobble, y: clawBody.velocity.y });
                            }
                        }
                    }
                }
            };

            ws.onclose = () => { setTimeout(initTwitchConnection, 5000); };
        }

        initTwitchConnection();
    </script>
</body>
</html>
